<div class="container">
  <form (ngSubmit)="onSubmit()" #categoryForm="ngForm">
    <input type="hidden" name="id" [value]="id()">
    <label>Bezeichnung</label>
    <input
      type="text"
      name="label"
      [ngModel]="label()"
      (ngModelChange)="label.set($event)"
      required="true"
    >
    
    <label>Standard-Betrag (Optional)</label>
    <div class="flex-input">
      <input
        type="number"
        name="amount"
        [ngModel]="amount()"
        (ngModelChange)="amount.set($event)"
      >
      <div>{{currency}}</div>
    </div>
    
    <div class="group">
      <label>
        <input
          type="radio"
          id="in"
          name="type"
          value="0"
          [ngModel]="type()"
          (ngModelChange)="type.set($event * 1)"
        >
        <span>Einnahme</span>
      </label>
      <label>
        <input
          type="radio"
          id="out"
          name="type"
          value="1"
          [ngModel]="type()"
          (ngModelChange)="type.set($event * 1)"
        >
        <span>Ausgabe</span>
      </label>
    </div>
    
    <a class="btn-flat" (click)="goBack()">Abbrechen</a>
    <button type="submit" class="btn">Bearbeiten</button>
  </form>
</div>
