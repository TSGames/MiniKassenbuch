<div class="container-center">
    <div class="login-logo">
        <img alt="Mini Kassenbuch" src="/logo.png">
    </div>
    <div class="container">
        <h5>Login</h5>
        <div class="error" *ngIf="firstTime()">
            Willkommen! Es wurde keine Nutzer-Konfiguration gefunden. Die nun erfolgende Eingabe wird für zukünftige Anmeldungen verwendet.
        </div>
        <div class="error" *ngIf="valid() === false">
            Ungültige Zugangsdaten. Falls Sie die Zugangsdaten vergessen haben, können Sie die Datei "data/authentication.json" löschen.
        </div>
        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <label>Nutzername</label>
            <input type="text" name="user" [(ngModel)]="credentials.user" required>
            <label>Passwort</label>
            <input type="password" name="password" [(ngModel)]="credentials.password" required>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
