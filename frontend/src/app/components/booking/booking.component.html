<div class="container">
  <mat-card
    *ngIf="error"
    class="error-card"
    role="alert"
  >
    {{error}}
  </mat-card>

  <mat-card>
    <mat-card-title>Buchung {{label}} bearbeiten</mat-card-title>
    <form (ngSubmit)="onSubmit()" #bookingForm="ngForm" class="booking-form">
      <mat-form-field class="full-width">
        <mat-label>Aktuelles Konto</mat-label>
        <input matInput [value]="activeAccount()?.label" readonly disabled>
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>Bezeichnung</mat-label>
        <input matInput name="label" [(ngModel)]="label" (blur)="guessCategory($event)">
      </mat-form-field>

      <div class="category-group">
        <label>Kategorie</label>
        <mat-button-toggle-group
          name="category"
          [(ngModel)]="selectedCategory"
          aria-label="Kategorie"
        >
          <mat-button-toggle
            *ngFor="let category of categories"
            [value]="category.id"
            (change)="loadCategory(category)"
          >
            {{category.label}}
          </mat-button-toggle>
        </mat-button-toggle-group>
        <button mat-stroked-button color="primary" type="button" (click)="clearCategorySelection()" *ngIf="categories.length">
          Auswahl aufheben
        </button>
        <div class="notice">Kategorien lassen sich unter <a [routerLink]="['/categories']">Kategorien</a> verwalten.</div>
      </div>

      <mat-form-field class="full-width">
        <mat-label>Datum</mat-label>
        <input matInput type="date" name="date" [(ngModel)]="date">
      </mat-form-field>

      <div class="flex-input">
        <mat-form-field class="full-width">
          <mat-label>Betrag</mat-label>
          <input matInput type="number" name="amount" [(ngModel)]="amount">
        </mat-form-field>
        <div class="currency-indicator">{{currency}}</div>
      </div>

      <div class="type-toggle">
        <mat-button-toggle-group name="type" [(ngModel)]="type" aria-label="Typ">
          <mat-button-toggle value="0">Einnahme</mat-button-toggle>
          <mat-button-toggle value="1">Ausgabe</mat-button-toggle>
        </mat-button-toggle-group>
      </div>

      <mat-form-field class="full-width">
        <mat-label>Bemerkungen, Kommentare etc.</mat-label>
        <textarea matInput name="notes" [(ngModel)]="notes" rows="4"></textarea>
      </mat-form-field>

      <div class="document-list">
        <h3>Dokumente</h3>
        <ul *ngIf="documents.length; else emptyDocuments">
          <li *ngFor="let document of documents" class="document-item">
            <mat-icon>description</mat-icon>
            <a [href]="getDocumentUrl(document.id)" target="_blank">{{document.filename}}</a>
            <button mat-icon-button color="warn" (click)="deleteDocument(document.id)">
              <mat-icon>clear</mat-icon>
            </button>
          </li>
        </ul>
        <ng-template #emptyDocuments>
          <p>Keine Dokumente vorhanden.</p>
        </ng-template>
      </div>

      <div class="add-documents">
        <label>Belege/Dokumente anheften</label>
        <input type="file" name="documents" multiple (change)="onFileChange($event)">
      </div>

      <div class="form-actions">
        <button mat-button color="primary" routerLink="/">Abbrechen &amp; Zurück</button>
        <button mat-raised-button color="accent" type="submit" [disabled]="readonly">Speichern</button>
      </div>
    </form>
  </mat-card>

  <div class="navigation">
    <button mat-fab color="primary" *ngIf="previousId" [routerLink]="['/edit', previousId]">
      <mat-icon>keyboard_arrow_left</mat-icon>
    </button>
    <button mat-fab color="primary" *ngIf="nextId" [routerLink]="['/edit', nextId]">
      <mat-icon>keyboard_arrow_right</mat-icon>
    </button>
  </div>
</div>
