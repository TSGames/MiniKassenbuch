<div class="container">
  <h4>Kategorien verwalten</h4>
  <div class="category-grid">
    <mat-card *ngFor="let category of categories()" class="category-card">
      <div class="category-title">{{category.label}}</div>
      <div class="category-meta">
        <span>{{category.amount === 0 ? '-' : category.amount > 0 ? 'Einnahme' : 'Ausgabe'}}</span>
        <span>{{(category.amount/100) | number:'1.2-2'}} {{currency}}</span>
        <span>{{category.count || 0}} Buchungen</span>
      </div>
      <div class="category-actions">
        <button mat-icon-button color="primary" [routerLink]="['/edit-category', category.id]">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" [routerLink]="['/delete-category', category.id]" *ngIf="!readonly()">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </mat-card>
  </div>
  <form class="add-form" (ngSubmit)="onAddCategory()" #categoryForm="ngForm">
    <mat-form-field class="full-width">
      <mat-label>Neue Kategorie</mat-label>
      <input matInput
        type="text"
        name="category"
        [ngModel]="newCategoryName()"
        (ngModelChange)="newCategoryName.set($event)"
        placeholder="z.B. Mitgliedsbeiträge"
        required
      >
    </mat-form-field>
    <button mat-raised-button color="accent" type="submit" [disabled]="readonly()">Anlegen</button>
  </form>
</div>
