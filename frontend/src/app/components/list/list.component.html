<div class="container">
  <div class="filter row">
    <h2>Ansicht filtern</h2>
    <div class="input-field col s12 m6">
      <select id="year" (change)="setFilter()">
        <option *ngFor="let i of yearRange" [value]="i" [selected]="i === filterYear">{{i}}</option>
      </select>
      <label>Jahr</label>
    </div>
    <div class="input-field col s12 m6">
      <select id="month" (change)="setFilter()">
        <option value="0" [selected]="0 === filterMonth">Gesamtes Jahr</option>
        <option *ngFor="let i of months" [value]="i" [selected]="i === filterMonth">{{i < 10 ? '0' + i : i}}</option>
      </select>
      <label>Monat</label>
    </div>
  </div>
  <div class="booking-table">
    <mat-card *ngFor="let booking of bookings" class="booking-card">
      <div class="booking-header">
        <div>
          <div class="booking-title">{{booking.label}}</div>
          <div class="booking-meta">
            <span>{{booking.date | date:'dd.MM.yyyy'}}</span>
            <span class="category-badge" *ngIf="booking.category">{{booking.category}}</span>
            <span class="category-badge warning" *ngIf="!booking.category">Ohne Zuordnung</span>
          </div>
        </div>
        <div class="booking-actions">
          <button mat-icon-button color="primary" [routerLink]="['/edit', booking.id]">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" [routerLink]="['/delete', booking.id]" [disabled]="readonly">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>
      <div class="booking-row">
        <div>Betrag</div>
        <strong [class.positive]="booking.type === 0" [class.negative]="booking.type === 1">
          {{(booking.amount/100) | number:'1.2-2'}} {{currency}}
        </strong>
      </div>
      <div class="booking-row">
        <div>Saldo</div>
        <strong [class.positive]="booking.saldo >= 0" [class.negative]="booking.saldo < 0">
          {{(booking.saldo/100) | number:'1.2-2'}} {{currency}}
        </strong>
      </div>
    </mat-card>
  </div>
  <div class="export-row">
    <button mat-stroked-button color="primary" routerLink="/export">
      {{filterYear}} exportieren als CSV
    </button>
  </div>
</div>
