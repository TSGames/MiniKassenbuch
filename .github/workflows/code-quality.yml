name: Code Quality & Build

on:
  push:
    branches: [ main, develop, claude/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-build:
    name: Frontend Build (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular app
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: frontend/dist/
          retention-days: 7

  backend-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: zip, pdo_sqlite, mbstring
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Check PHP syntax
        run: |
          find src/ public/index.php -name "*.php" -type f -exec php -l {} \; | grep -E "No syntax errors|Parse error" || true
          echo "✅ PHP syntax check complete"

      - name: Run Psalm analysis
        run: ./vendor/bin/psalm --output-format=github || true
        continue-on-error: true

      - name: Check Composer requirements
        run: composer validate --no-interaction

  build-verification:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (dry-run)
        run: |
          echo "Verifying Dockerfile..."
          docker build --dry-run . || true
          echo "✅ Dockerfile syntax verified"
